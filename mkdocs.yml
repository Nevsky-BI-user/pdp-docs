site_name: People Digital Profile — документація моделі
site_url: https://nevsky-bi-user.github.io/pdp-docs/
site_description: Документація семантичної моделі Power BI People Digital Profile — метрики за сторінками звіту, бізнес-суть, залежності.
repo_url: https://github.com/Nevsky-BI-user/pdp-docs
repo_name: Nevsky-BI-user/pdp-docs
theme:
  name: material
  language: uk
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Темна тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Світла тема
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips
    - navigation.footer
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
nav:
  - Головна: index.md
  - Звіт:
      - Огляд звіту: report/index.md
      - "Personal Profile": report/personal-profile.md
      - "Group Profile": report/group-profile.md
      - "Під ризиком мобілізації": report/pid-ryzykom-mobilizatsii.md
      - "Утримання працівників": report/utrymannia-pratsivnykiv.md
      - "Продуктивність працівників": report/produktyvnist-pratsivnykiv.md
      - Тултіпи та підказки:
          - "TT:Життєвий цикл": report/tt-zhyttievyi-tsykl.md
          - "TT:Зміна фікс винагороди": report/tt-zmina-fiks-vynahorody.md
